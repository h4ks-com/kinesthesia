services:
  app:
    build: .
    image: ghcr.io/h4ks-com/kinesthesia:latest
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: file:/app/data/kinesthesia.db
    volumes:
      - scores:/app/data
    restart: unless-stopped

volumes:
  scores:
